name: Daily VillaGO Instagram Post

on:
  schedule:
    # 每天 01:00 UTC = 北京时间 09:00 / 泰国时间 08:00
    - cron: "0 1 * * *"
  workflow_dispatch:   # 允许手动点击运行

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-freefont-ttf curl

      - name: Install Python deps
        run: pip install Pillow

      - name: Run daily post
        id: post
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VILLA_ID: V4
        run: python tools/daily_post.py

      # 失败自动重试一次（等30秒再跑）
      - name: Retry on failure
        if: failure() && steps.post.outcome == 'failure'
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VILLA_ID: V4
        run: |
          echo "⚠️ First attempt failed, retrying in 30s..."
          sleep 30
          python tools/daily_post.py
